<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#facc15"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
  </defs>
  <!-- Sun -->
  <circle cx="65" cy="35" r="20" fill="url(#sunGrad)"/>
  <!-- Cloud -->
  <ellipse cx="30" cy="65" rx="22" ry="15" fill="url(#cloudGrad)"/>
  <ellipse cx="50" cy="60" rx="18" ry="13" fill="url(#cloudGrad)"/>
  <ellipse cx="40" cy="55" rx="15" ry="12" fill="url(#cloudGrad)"/>
  <ellipse cx="55" cy="70" rx="20" ry="12" fill="url(#cloudGrad)"/>
