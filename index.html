<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Weather - Real-time Forecasts</title>
    <meta name="title" content="Weather - Real-time Forecasts" />
    <meta name="description" content="Multi-source weather aggregation with accurate forecasts from OpenWeatherMap, WeatherAPI, Weather.gov, and Open-Meteo. Hourly and 10-day predictions with radar overlay." />
    
    <!-- Theme Color for browser UI -->
    <meta name="theme-color" content="#07080a" />
    <meta name="color-scheme" content="dark" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- App icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Weather - Real-time Forecasts" />
    <meta property="og:description" content="Get accurate weather forecasts with hourly and 10-day predictions." />
    <meta property="og:image" content="/favicon.svg" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Weather - Real-time Forecasts" />
    <meta property="twitter:description" content="Get accurate weather forecasts with hourly and 10-day predictions." />
    <meta property="twitter:image" content="/favicon.svg" />
    
    <!-- Preconnect to external domains for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.open-meteo.com" />
    <link rel="preconnect" href="https://api.openweathermap.org" />
    <link rel="preconnect" href="https://api.weatherapi.com" />
    <link rel="preconnect" href="https://api.weather.gov" />
    <link rel="preconnect" href="https://tilecache.rainviewer.com" />

    <!-- DNS Prefetch for geocoding -->
    <link rel="dns-prefetch" href="https://nominatim.openstreetmap.org" />
    <!-- Leaflet map tiles -->
    <link rel="dns-prefetch" href="https://tile.openstreetmap.org" />
    
    <!-- Runtime config (generated by Docker entrypoint, optional for local dev) -->
    <script src="/config.js" onerror="console.log('[Weather App] No runtime config, using build-time defaults')"></script>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
